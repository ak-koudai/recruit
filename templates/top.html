<!DOCTYPE html>
<html>

<head>

<title>採用力診断</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#ffffff;
}

/* 画像エリア */

.hero{
position:relative;
width:100%;
max-width:100%;
margin:auto;
}

.hero img{
width:100%;
height:auto;
display:block;
}

/* 共通ボタン */

.cta-button{
background:#ff7a2f;
color:white;
border:none;
padding:35px 0;
font-size:40px;
border-radius:18px;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
font-weight:bold;
width:100%;
}

.cta-button:hover{
background:#ff6512;
}

/* ===== 中央ボタン ===== */

.cta-center{
position:absolute;
top:69%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
}

/* ===== 右下ボタン ===== */

.cta-bottom{
position:absolute;
top:92%;
right:4.5%;
width:500px;
}

/* ===== スマホ調整 ===== */

@media (max-width:600px){

.cta-center{
top:65%;
width:70%;
}

.cta-bottom{
top:84%;
right:4%;
width:180px;
}

.cta-button{
font-size:16px;
padding:14px 0;
}

}

</style>

</head>

<body>

<div class="hero">

<img src="/static/top_visual.png">

<!-- 中央ボタン -->
<div class="cta-center">

<form action="/diagnosis">
<button class="cta-button">
無料診断スタート
</button>
</form>

</div>

<!-- 右下ボタン -->
<div class="cta-bottom">

<form action="/diagnosis">
<button class="cta-button">
無料診断スタート
</button>
</form>

</div>

</div>

</body>

</html>
