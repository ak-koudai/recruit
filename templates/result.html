<!DOCTYPE html>
<html>

<head>

<title>診断結果</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.08);
}

h1{
font-size:24px;
margin-bottom:10px;
}

.result{
font-size:26px;
font-weight:bold;
color:#2c7be5;
margin-bottom:10px;
}

.comment{
margin-top:10px;
font-size:16px;
line-height:1.6;
color:#555;
}

.chart-box{
margin-top:25px;
}

canvas{
max-width:100%;
height:auto;
}

button{
margin-top:30px;
width:100%;
padding:16px;
font-size:18px;
background:#2c7be5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1f63c5;
}

</style>

</head>

<body>

<div class="container">

<h1>{{company}} の診断結果</h1>

<div class="result">
{{result}}
</div>

<div class="comment">
{{comment}}
</div>

<div class="chart-box">

<canvas id="chart"></canvas>

</div>

<form action="/diagnosis">

<button type="submit">
もう一度診断する
</button>

</form>

</div>

<script>

const data = {
labels:["接点","求人力","認知","組織力"],
datasets:[{
label:"採用力",
data:[{{contact}},{{recruit}},{{recognition}},{{organization}}],
fill:true,
backgroundColor:"rgba(44,123,229,0.2)",
borderColor:"#2c7be5",
pointBackgroundColor:"#2c7be5"
}]
};

const config = {
type:"radar",
data:data,
options:{
responsive:true,
maintainAspectRatio:false,
scales:{
r:{
min:0,
max:12,
ticks:{stepSize:3}
}
}
}
};

new Chart(
document.getElementById("chart"),
config
);

</script>

</body>
</html>
